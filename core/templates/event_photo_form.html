{% extends 'base.html' %}

{% block page_title %}{{ action_title }} Event Photo{% endblock %}

{% block content %}
<div class="glass" style="padding: 2rem; border-radius: var(--radius-lg); max-width: 600px;">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group">
            <label class="form-label" for="title">Photo Title (Optional)</label>
            <input type="text" id="title" name="title" class="form-control" placeholder="e.g., Annual Sports Day 2026">
        </div>

        <div class="form-group">
            <label class="form-label" for="photo">Select Photo</label>
            <input type="file" id="photo" name="photo" class="form-control" accept="image/*" required>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-cloud-arrow-up"></i> Upload Photo
            </button>
            <a href="{% url 'event_photo_list' %}" class="btn" style="background: rgba(0,0,0,0.05);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
