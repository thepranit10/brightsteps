{% extends 'base.html' %}
{% block title %}{{ action_title }} Class Schedule - BrightSteps{% endblock %}

{% block content %}
<div class="glass" style="padding: 2rem; border-radius: var(--radius-lg); max-width: 600px;">
    <h2 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-calendar-days" style="color: var(--primary);"></i> {{ action_title }} Class Schedule</h2>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label class="form-label" for="teacher_id">Teacher</label>
            <select id="teacher_id" name="teacher_id" class="form-control" required>
                <option value="">Select a Teacher...</option>
                {% for teacher in teachers %}
                    <option value="{{ teacher.id }}">{{ teacher.name }} ({{ teacher.subject_specialty }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="subject">Subject</label>
            <input type="text" id="subject" name="subject" class="form-control" required placeholder="e.g. Mathematics 101">
        </div>
        
        <div class="form-group">
            <label class="form-label" for="day_of_week">Day of Week</label>
            <select id="day_of_week" name="day_of_week" class="form-control" required>
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label class="form-label" for="start_time">Start Time</label>
                <input type="time" id="start_time" name="start_time" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="end_time">End Time</label>
                <input type="time" id="end_time" name="end_time" class="form-control" required>
            </div>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Save Schedule</button>
            <a href="{% url 'schedule_list' %}" class="btn" style="background: rgba(0,0,0,0.05);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
