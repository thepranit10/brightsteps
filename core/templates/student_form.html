{% extends 'base.html' %}
{% block title %}{{ action_title }} Student - BrightSteps{% endblock %}

{% block content %}
<div class="glass" style="padding: 2rem; border-radius: var(--radius-lg); max-width: 600px;">
    <h2 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-user-graduate" style="color: var(--primary);"></i> {{ action_title }} Student</h2>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="Student's Full Name" value="{{ student.name|default:'' }}">
        </div>

        <div class="form-group">
            <label class="form-label" for="email">Email Address (Optional)</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="student@example.com" value="{{ student.email|default:'' }}">
        </div>

        <div class="form-group">
            <label class="form-label" for="parent_phone_number">Parent Phone Number (Used for Login)</label>
            <input type="text" id="parent_phone_number" name="parent_phone_number" class="form-control" placeholder="e.g. 9876543210" value="{{ student.parent_phone_number|default:'' }}">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label class="form-label" for="roll_number">Roll Number</label>
                <input type="text" id="roll_number" name="roll_number" class="form-control" required placeholder="e.g. 101" value="{{ student.roll_number|default:'' }}">
            </div>

            <div class="form-group">
                <label class="form-label" for="grade_level">Class / Standard</label>
                <select id="grade_level" name="grade_level" class="form-control" required>
                    <option value="">Select Class...</option>
                    <option value="Jr KG" {% if student.grade_level == 'Jr KG' %}selected{% endif %}>Jr KG</option>
                    <option value="Sr KG" {% if student.grade_level == 'Sr KG' %}selected{% endif %}>Sr KG</option>
                    <option value="Class 1" {% if student.grade_level == 'Class 1' %}selected{% endif %}>Class 1</option>
                    <option value="Class 2" {% if student.grade_level == 'Class 2' %}selected{% endif %}>Class 2</option>
                    <option value="Class 3" {% if student.grade_level == 'Class 3' %}selected{% endif %}>Class 3</option>
                    <option value="Class 4" {% if student.grade_level == 'Class 4' %}selected{% endif %}>Class 4</option>
                </select>
            </div>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Save Student</button>
            <a href="{% url 'student_list' %}" class="btn" style="background: rgba(0,0,0,0.05);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
