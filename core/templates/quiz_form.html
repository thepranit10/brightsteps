{% extends 'base.html' %}

{% block page_title %}{{ action_title }} Quiz Question{% endblock %}

{% block content %}
<div class="glass" style="padding: 2rem; border-radius: var(--radius-lg); max-width: 800px;">
    <form method="POST">
        {% csrf_token %}
        
        <div style="display: grid; grid-template-columns: 2fr 1.5fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label class="form-label" for="subject">Subject Category</label>
                <select id="subject" name="subject" class="form-control" required style="padding: 0.75rem;">
                    {% for sub in subjects %}
                        <option value="{{ sub }}" {% if quiz.subject == sub %}selected{% endif %}>{{ sub }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="grade_level">Grade Level / Class</label>
                <select id="grade_level" name="grade_level" class="form-control" required style="padding: 0.75rem;">
                    {% for grade in grade_levels %}
                        <option value="{{ grade }}" {% if quiz.grade_level == grade %}selected{% endif %}>{{ grade }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="points">Points</label>
                <input type="number" id="points" name="points" class="form-control" value="{{ quiz.points|default:10 }}" required min="1">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label class="form-label" for="question_en">Question (English)</label>
                <textarea id="question_en" name="question_en" class="form-control" rows="3" required placeholder="What is 1+1?">{{ quiz.question_en|default:'' }}</textarea>
            </div>
            <div class="form-group">
                <label class="form-label" for="question_mr">Question (Marathi)</label>
                <textarea id="question_mr" name="question_mr" class="form-control" rows="3" required placeholder="१+१ किती?">{{ quiz.question_mr|default:'' }}</textarea>
            </div>
        </div>

        <h3 style="margin-top: 1.5rem; margin-bottom: 1rem; color: var(--primary);">Options (English)</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label class="form-label" for="option_1_en">Option 1</label>
                <input type="text" id="option_1_en" name="option_1_en" class="form-control" value="{{ quiz.option_1_en|default:'' }}" required placeholder="Option 1">
            </div>
            <div class="form-group">
                <label class="form-label" for="option_2_en">Option 2</label>
                <input type="text" id="option_2_en" name="option_2_en" class="form-control" value="{{ quiz.option_2_en|default:'' }}" required placeholder="Option 2">
            </div>
            <div class="form-group">
                <label class="form-label" for="option_3_en">Option 3</label>
                <input type="text" id="option_3_en" name="option_3_en" class="form-control" value="{{ quiz.option_3_en|default:'' }}" required placeholder="Option 3">
            </div>
            <div class="form-group">
                <label class="form-label" for="option_4_en">Option 4</label>
                <input type="text" id="option_4_en" name="option_4_en" class="form-control" value="{{ quiz.option_4_en|default:'' }}" required placeholder="Option 4">
            </div>
        </div>

        <h3 style="margin-top: 1.5rem; margin-bottom: 1rem; color: var(--primary);">Options (Marathi)</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label class="form-label" for="option_1_mr">Option 1 (Marathi)</label>
                <input type="text" id="option_1_mr" name="option_1_mr" class="form-control" value="{{ quiz.option_1_mr|default:'' }}" required placeholder="Option 1">
            </div>
            <div class="form-group">
                <label class="form-label" for="option_2_mr">Option 2 (Marathi)</label>
                <input type="text" id="option_2_mr" name="option_2_mr" class="form-control" value="{{ quiz.option_2_mr|default:'' }}" required placeholder="Option 2">
            </div>
            <div class="form-group">
                <label class="form-label" for="option_3_mr">Option 3 (Marathi)</label>
                <input type="text" id="option_3_mr" name="option_3_mr" class="form-control" value="{{ quiz.option_3_mr|default:'' }}" required placeholder="Option 3">
            </div>
            <div class="form-group">
                <label class="form-label" for="option_4_mr">Option 4 (Marathi)</label>
                <input type="text" id="option_4_mr" name="option_4_mr" class="form-control" value="{{ quiz.option_4_mr|default:'' }}" required placeholder="Option 4">
            </div>
        </div>

        <div class="form-group" style="margin-top: 1.5rem;">
            <label class="form-label" for="correct_answer_index">Correct Answer Option</label>
            <select id="correct_answer_index" name="correct_answer_index" class="form-control" required style="padding: 0.75rem;">
                <option value="0" {% if quiz.correct_answer_index == 0 %}selected{% endif %}>Option 1</option>
                <option value="1" {% if quiz.correct_answer_index == 1 %}selected{% endif %}>Option 2</option>
                <option value="2" {% if quiz.correct_answer_index == 2 %}selected{% endif %}>Option 3</option>
                <option value="3" {% if quiz.correct_answer_index == 3 %}selected{% endif %}>Option 4</option>
            </select>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Save Question</button>
            <a href="{% url 'quiz_list' %}" class="btn" style="background: rgba(0,0,0,0.05);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
