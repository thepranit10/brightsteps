{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrightSteps Admin Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            justify-content: center;
            align-items: center;
            background: #F8FAFC;
            color: #0F172A;
        }
        .login-wrapper {
            position: relative;
            width: 100%;
            max-width: 440px;
            padding: 1rem;
        }
        .login-card {
            padding: 3rem 2.5rem;
            border-radius: 32px;
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }
        .login-brand {
            font-size: 2.4rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }
        .input-icon-wrapper {
            position: relative;
        }
        .input-icon-wrapper i {
            position: absolute;
            left: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .input-icon-wrapper input {
            padding-left: 3rem;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand login-brand" style="justify-content: center;">
                <i class="fa-solid fa-graduation-cap"></i> Bright<span>Steps</span>
            </div>
            <p style="text-align: center; color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; font-weight: 500;">
                Primary School Administration Portal
            </p>
            
            {% if error %}
                <div style="background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--danger); padding: 0.85rem 1.15rem; border-radius: var(--radius-sm); margin-bottom: 1.5rem; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
                </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="username">Admin Username</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" name="username" class="form-control" required placeholder="Enter username">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" class="form-control" required placeholder="Enter password">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.9rem; font-size: 1rem; border-radius: var(--radius-md);">
                    Sign In to Dashboard <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

</body>
</html>
